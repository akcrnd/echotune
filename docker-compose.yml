services:
  echotune:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echotune
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATA_FILE_PATH: /data/data.json
    volumes:
      - echotune_data:/data

volumes:
  echotune_data:
